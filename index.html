<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What 2 Do?</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

    <div class="app">

        <!-- Sidebar -->
       

        <!-- Main -->
        <main class="main">

            <!-- Header -->

           <header>

   <div class="header-text">
    <h1>What 2 Do? </h1>
    <p class="tagline">Simple. Fast. Organized.</p>
</div>

    <button id="themeBtn">

        <i class="fa-solid fa-moon"></i>

    </button>

</header>
<!-- Add Task -->
<section class="add-task">

    <input
        type="text"
        id="taskInput"
        placeholder="Enter task...">

    <!-- Date -->
    <div class="input-box">
        <i class="fa-solid fa-calendar-days"></i>
        <input type="date" id="dueDate">
    </div>

    <!-- Time -->
    <div class="input-box">
        <i class="fa-solid fa-clock"></i>
        <input type="time" id="dueTime">
    </div>

    <!-- Reminder -->
    <select id="reminder">
        <option value="0">No Reminder</option>
        <option value="1">1 Minute Before</option>
        <option value="2">2 Minutes Before</option>
        <option value="5" selected>5 Minutes Before</option>
        <option value="15">15 Minutes Before</option>
    </select>

    <!-- Add Button -->
    <button id="addBtn">
        <i class="fa-solid fa-plus"></i>
        Add
    </button>

</section>
<!-- Search -->
<div class="search-box">

    <i class="fa-solid fa-search"></i>

    <input
        type="text"
        id="search"
        placeholder="Search tasks...">

</div>

<!-- Stats -->
<section class="stats">

    <div class="card">
        <h3>Total</h3>
        <h2 id="totalTask">0</h2>
    </div>

    <div class="card">
        <h3>Completed</h3>
        <h2 id="completedTask">0</h2>
    </div>

    <div class="card">
        <h3>Pending</h3>
        <h2 id="pendingTask">0</h2>
    </div>

</section>

<!-- Progress -->
<div class="progress">
    <div id="progressBar"></div>
</div>
            <!-- Filters -->

            <div class="filters">

                <button class="filter active" data-filter="all">

                    All

                </button>

                <button class="filter" data-filter="pending">

                    Pending

                </button>

                <button class="filter" data-filter="completed">

                    Completed

                </button>

            </div>

            <!-- Tasks -->

            <div id="taskList"></div>

        </main>

    </div>

    <script type="module" src="script.js"></script>
    <div id="popup" class="popup">
    <div class="popup-content">
        <i class="fa-solid fa-circle-check"></i>
        <h2>Great Job! 🎉</h2>
        <p>Thank you for completing your task.</p>
        <button onclick="closePopup()">Continue</button>
    </div>
</div>

</body>

</html>
